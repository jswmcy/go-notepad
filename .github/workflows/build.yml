name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: docker.io
  IMAGE_NAME: zenbox01/go-notepad

jobs:
  build-docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: Build binaries
        run: |
          mkdir -p release

          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o go-notepad.exe .
          mkdir -p windows-pkg/static
          cp static/index.html windows-pkg/static/
          mv go-notepad.exe windows-pkg/
          cd windows-pkg && zip -r ../release/go-notepad-windows-amd64.zip .

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o go-notepad .
          mkdir -p linux-amd64-pkg/static
          cp static/index.html linux-amd64-pkg/static/
          mv go-notepad linux-amd64-pkg/
          cd linux-amd64-pkg && zip -r ../release/go-notepad-linux-amd64.zip .

          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o go-notepad .
          mkdir -p linux-arm64-pkg/static
          cp static/index.html linux-arm64-pkg/static/
          mv go-notepad linux-arm64-pkg/
          cd linux-arm64-pkg && zip -r ../release/go-notepad-linux-arm64.zip .

          GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -ldflags="-s -w" -o go-notepad .
          mkdir -p linux-armv7-pkg/static
          cp static/index.html linux-armv7-pkg/static/
          mv go-notepad linux-armv7-pkg/
          cd linux-armv7-pkg && zip -r ../release/go-notepad-linux-armv7.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.zip
          generate_release_notes: true
