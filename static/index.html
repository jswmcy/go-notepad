<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>go-notepad</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:#333}

#edit-page{height:100vh;display:flex;flex-direction:column}
.toolbar{padding:6px 10px;display:flex;gap:4px;flex-wrap:wrap;background:#fafafa;border-bottom:1px solid #eee;align-items:center}
.btn{padding:4px 12px;font-size:13px;border:1px solid #ccc;background:#fff;cursor:pointer;border-radius:3px;min-width:32px;text-align:center}
.btn:hover{background:#eee}
.status{margin-left:auto;font-size:12px;padding:2px 8px;border-radius:3px;transition:opacity .3s}
.status.saving{color:#666;background:#f0f0f0}
.status.ok{color:#2d7d46;background:#e8f5e9}
.status.err{color:#c62828;background:#ffebee}
.editor-wrap{flex:1;overflow-y:auto}
.editor{min-height:100%;padding:16px;outline:none;font-size:15px;line-height:1.8}
.note-name-bar{padding:6px 12px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px}
.note-name-bar a{color:#666;text-decoration:none;font-size:13px}
.note-name-bar span{font-weight:bold;font-size:14px}
</style>
</head>
<body>

<div id="edit-page">
  <div class="note-name-bar">
    <a href="/">📝 列表</a>
    <span>/</span>
    <span id="note-title"></span>
  </div>
  <div class="toolbar">
    <button class="btn" onclick="doBold()"><b>B</b></button>
    <button class="btn" onclick="doH1()">H1</button>
    <button class="btn" onclick="doH3()">H3</button>
    <button class="btn" onclick="doUl()">—</button>
    <button class="btn" onclick="doOl()">1.</button>
    <button class="btn" onclick="doQuote()">></button>
    <button class="btn" onclick="doCode()"><></button>
    <button class="btn" onclick="doHr()">—</button>
    <span id="status" class="status" style="opacity:0"></span>
  </div>
  <div class="editor-wrap"><div id="editor" class="editor" contenteditable="true"></div></div>
</div>

<script>
var currentNote = '';
var saveTimer = null;
var statusTimer = null;

// 从 URL 路径获取笔记本名称
function getNoteName() {
  var path = window.location.pathname;
  if (path === '/' || path === '') return 'default';
  return decodeURIComponent(path.replace(/^\//, ''));
}

// 显示状态
function showStatus(type, text) {
  var el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = text;
  el.style.opacity = '1';
  if (statusTimer) clearTimeout(statusTimer);
  if (type === 'ok') {
    statusTimer = setTimeout(function() { el.style.opacity = '0'; }, 2000);
  }
}

// 打开笔记本
function openNote(name) {
  currentNote = name;
  document.getElementById('note-title').textContent = name;
  var editor = document.getElementById('editor');
  editor.innerHTML = '';
  fetch('/load?name=' + encodeURIComponent(name))
    .then(function(r) { return r.text(); })
    .then(function(text) {
      if (text) {
        var lines = text.split('\n');
        var html = '';
        for (var i = 0; i < lines.length; i++) {
          if (lines[i] === '') {
            html += '<div><br></div>';
          } else {
            html += '<div>' + escHtml(lines[i]) + '</div>';
          }
        }
        editor.innerHTML = html;
      } else {
        editor.innerHTML = '<div><br></div>';
      }
    });
}

// ---- 保存 ----
function doSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    showStatus('saving', '保存中...');
    var editor = document.getElementById('editor');
    var divs = editor.querySelectorAll('div');
    var text = [];
    for (var i = 0; i < divs.length; i++) {
      text.push(divs[i].textContent);
    }
    fetch('/save', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: 'name=' + encodeURIComponent(currentNote) + '&content=' + encodeURIComponent(text.join('\n'))
    })
    .then(function(r) {
      if (r.ok) {
        showStatus('ok', '✓ 保存成功');
      } else {
        showStatus('err', '✗ 保存失败: ' + r.status);
      }
    })
    .catch(function() {
      showStatus('err', '✗ 保存失败');
    });
  }, 500);
}

// ---- 格式化按钮 ----
function doBold() { document.execCommand('bold', false, null); doSave(); }
function doCode() {
  var sel = window.getSelection().toString();
  document.execCommand('insertHTML', false, sel ? '<code>' + sel + '</code>' : '<code>代码</code>');
  doSave();
}
function doHr() { document.execCommand('insertHTML', false, '<hr>'); doSave(); }
function doH1() { wrapSelection('<h1>', '</h1>'); }
function doH3() { wrapSelection('<h3>', '</h3>'); }
function doUl() { insertLine('• '); }
function doOl() { insertLine('1. '); }
function doQuote() { insertLine('> '); }

function wrapSelection(tagOpen, tagClose) {
  var sel = window.getSelection().toString() || '文本';
  document.execCommand('insertHTML', false, tagOpen + sel + tagClose);
  doSave();
}

function insertLine(prefix) {
  var sel = window.getSelection().toString() || '文本';
  document.execCommand('insertHTML', false, '<div>' + prefix + sel + '</div>');
  doSave();
}

// ---- 工具函数 ----
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- 事件绑定 ----
document.getElementById('editor').addEventListener('input', doSave);
document.getElementById('editor').addEventListener('keydown', function(e) {
  if (e.key === 'Tab') { e.preventDefault(); document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;'); }
});

// ---- 初始化 ----
openNote(getNoteName());
</script>
</body>
</html>
