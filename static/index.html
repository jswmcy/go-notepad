<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>go-notepad</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:#333}

#edit-page{height:100vh;display:flex;flex-direction:column}
.toolbar{padding:6px 10px;display:flex;gap:4px;flex-wrap:wrap;background:#fafafa;border-bottom:1px solid #eee;align-items:center}
.btn{padding:4px 12px;font-size:13px;border:1px solid #ccc;background:#fff;cursor:pointer;border-radius:3px;min-width:32px;text-align:center}
.btn:hover{background:#eee}
.status{margin-left:auto;font-size:12px;padding:2px 8px;border-radius:3px;transition:opacity .3s}
.status.saving{color:#666;background:#f0f0f0}
.status.ok{color:#2d7d46;background:#e8f5e9}
.status.err{color:#c62828;background:#ffebee}
.editor-wrap{flex:1;overflow-y:auto}
.editor{min-height:100%;padding:16px;outline:none;font-size:15px;line-height:1.8}
.note-name-bar{padding:6px 12px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px}
.note-name-bar a{color:#666;text-decoration:none;font-size:13px}
.note-name-bar span{font-weight:bold;font-size:14px}

/* 渲染样式 */
.editor h1{font-size:22px;font-weight:bold;margin:12px 0 8px}
.editor h2{font-size:19px;font-weight:bold;margin:10px 0 6px}
.editor h3{font-size:17px;font-weight:bold;margin:10px 0 6px}
.editor blockquote{border-left:4px solid #ddd;padding:4px 12px;color:#666;margin:8px 0;background:#fafafa}
.editor code{background:#f5f5f5;padding:1px 4px;border-radius:3px;font-family:monospace;font-size:13px}
.editor pre{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:4px;padding:12px;font-family:monospace;font-size:13px;line-height:1.5;overflow-x:auto;margin:8px 0;white-space:pre-wrap}
.editor pre code{background:none;padding:0;border-radius:0;font-size:inherit}
.editor hr{border:none;border-top:2px solid #eee;margin:16px 0}
.editor ul,.editor ol{margin:8px 0;padding-left:20px}
.editor li{margin:3px 0}
.editor em,.editor i{font-style:italic}
.editor strong,.editor b{font-weight:bold}

/* 图片笔记本样式 */
#image-page{display:none;height:100vh;flex-direction:column}
.image-grid{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.image-card{border:1px solid #eee;border-radius:6px;overflow:hidden;background:#fff;transition:box-shadow .2s}
.image-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.image-preview{width:100%;height:180px;object-fit:cover;cursor:pointer;background:#fafafa}
.image-note{width:100%;padding:8px;border:none;border-top:1px solid #eee;font-size:13px;outline:none;resize:none;min-height:60px;font-family:inherit}
.image-note:focus{border-color:#ccc}
.toast{position:fixed;top:20px;right:20px;background:#4caf50;color:white;padding:10px 16px;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:1000;animation:fadeInOut 2.5s ease-in-out}
@keyframes fadeInOut{0%,100%{opacity:0;transform:translateY(-10px)}20%,80%{opacity:1;transform:translateY(0)}}
.lightbox{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:2000;display:flex;align-items:center;justify-content:center;cursor:pointer}
.lightbox img{max-width:90%;max-height:90%;object-fit:contain}
.upload-area{border:2px dashed #ccc;border-radius:8px;padding:40px 20px;text-align:center;color:#666;margin-bottom:20px;cursor:pointer;transition:border-color .2s}
.upload-area:hover{border-color:#999}
.upload-area.dragover{border-color:#4caf50;background:#f8fff8}
.mode-switch{margin-left:8px;padding:2px 8px;font-size:12px;border:1px solid #ccc;border-radius:3px;background:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.mode-switch:hover{background:#f0f0f0}
</style>
</head>
<body>

<div id="edit-page">
  <div class="note-name-bar">
    <a href="/">📝 列表</a>
    <span>/</span>
    <span id="note-title"></span>
    <button id="mode-switch" class="mode-switch" onclick="toggleMode()" title="切换到图片笔记本">📷 图片</button>
  </div>
  <div class="toolbar">
    <button class="btn" onclick="doBold()" title="加粗"><b>B</b></button>
    <button class="btn" onclick="doH1()" title="一级标题">H1</button>
    <button class="btn" onclick="doH3()" title="三级标题">H3</button>
    <button class="btn" onclick="doUl()" title="无序列表">—</button>
    <button class="btn" onclick="doOl()" title="有序列表">1.</button>
    <button class="btn" onclick="doQuote()" title="引用">></button>
    <button class="btn" onclick="doCode()" title="代码块"><></button>
    <button class="btn" onclick="doHr()" title="分割线">—</button>
    <span id="status" class="status" style="opacity:0"></span>
  </div>
  <div class="editor-wrap"><div id="editor" class="editor" contenteditable="true"></div></div>
</div>

<!-- 图片笔记本页面 -->
<div id="image-page">
  <div class="note-name-bar">
    <a href="/">📝 列表</a>
    <span>/</span>
    <span id="image-note-title"></span>
    <button id="image-mode-switch" class="mode-switch" onclick="toggleMode()" title="切换到文本笔记本">📝 文本</button>
  </div>
  <div class="image-grid" id="image-grid">
    <div class="upload-area" id="upload-area" onclick="document.getElementById('upload-input').click()">
      <div>📷 点击上传或拖拽/粘贴图片到此处</div>
      <div style="font-size:12px;margin-top:8px;color:#999">支持 PNG / JPEG / GIF / WebP，单张最大 10MB</div>
    </div>
  </div>
  <input type="file" id="upload-input" accept="image/png,image/jpeg,image/gif,image/webp" multiple style="display:none" onchange="handleFileSelect(event)">
</div>

<script>
var currentNote = '';
var saveTimer = null;
var statusTimer = null;

function getNoteName() {
  var path = window.location.pathname;
  if (path === '/' || path === '') return 'default';
  return decodeURIComponent(path.replace(/^\//, ''));
}

function showStatus(type, text) {
  var el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = text;
  el.style.opacity = '1';
  if (statusTimer) clearTimeout(statusTimer);
  if (type === 'ok') statusTimer = setTimeout(function() { el.style.opacity = '0'; }, 2000);
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ========== MD 文本 → HTML 渲染 ==========
// 支持语法：# ## ### 标题、**加粗__加粗、*斜体_斜体、~~删除线~~
//          `行内代码`、```代码块```、> 引用、--- 分割线、- 无序列表、1. 有序列表

function mdToHtml(text) {
  var lines = text.split('\n');
  var html = '';
  var inCodeBlock = false;
  var codeBuf = [];
  var inList = false;
  var listType = '';
  var listBuf = [];

  function flushList() {
    if (inList && listBuf.length > 0) {
      html += '<' + listType + '>' + listBuf.join('') + '</' + listType + '>';
      listBuf = [];
      inList = false;
    }
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // 代码块
    if (line.trim() === '```') {
      flushList();
      if (!inCodeBlock) {
        inCodeBlock = true;
        codeBuf = [];
      } else {
        inCodeBlock = false;
        html += '<pre><code>' + escHtml(codeBuf.join('\n')) + '</code></pre>';
      }
      continue;
    }
    if (inCodeBlock) { codeBuf.push(line); continue; }

    // 空行
    if (line === '') {
      flushList();
      html += '<div><br></div>';
      continue;
    }

    // 分割线
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(line.trim())) {
      flushList();
      html += '<hr>';
      continue;
    }

    // 标题
    var hMatch = line.match(/^(#{1,3})\s+(.+)/);
    if (hMatch) {
      flushList();
      var tag = 'h' + hMatch[1].length;
      html += '<' + tag + '>' + renderInline(hMatch[2]) + '</' + tag + '>';
      continue;
    }

    // 引用
    if (line.startsWith('>')) {
      flushList();
      html += '<blockquote>' + renderInline(line.replace(/^>\s*/, '')) + '</blockquote>';
      continue;
    }

    // 无序列表
    if (/^[\s]*[-*+]\s/.test(line)) {
      if (!inList || listType !== 'ul') { flushList(); inList = true; listType = 'ul'; }
      listBuf.push('<li>' + renderInline(line.replace(/^[\s]*[-*+]\s/, '')) + '</li>');
      continue;
    }

    // 有序列表
    if (/^[\s]*\d+\.\s/.test(line)) {
      if (!inList || listType !== 'ol') { flushList(); inList = true; listType = 'ol'; }
      listBuf.push('<li>' + renderInline(line.replace(/^[\s]*\d+\.\s/, '')) + '</li>');
      continue;
    }

    // 普通段落
    flushList();
    html += '<div>' + renderInline(line) + '</div>';
  }

  flushList();
  if (inCodeBlock && codeBuf.length > 0) {
    html += '<pre><code>' + escHtml(codeBuf.join('\n')) + '</code></pre>';
  }
  return html;
}

// 行内渲染：加粗、斜体、删除线、行内代码
function renderInline(text) {
  // 行内代码 `...`
  text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // 删除线 ~~...~~
  text = text.replace(/~~([^~]+)~~/g, '<del>$1</del>');
  // 加粗 **...** 或 __...__
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
  // 斜体 *...* 或 _..._
  text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  text = text.replace(/_([^_]+)_/g, '<em>$1</em>');
  return text;
}

// ========== 加载笔记 ==========
function openNote(name) {
  currentNote = name;
  document.getElementById('note-title').textContent = name;
  var editor = document.getElementById('editor');
  editor.innerHTML = '';
  fetch('/load?name=' + encodeURIComponent(name))
    .then(function(r) { return r.text(); })
    .then(function(text) {
      editor.innerHTML = text ? mdToHtml(text) : '<div><br></div>';
    });
}

// ========== 保存 ==========
function doSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    showStatus('saving', '保存中...');
    var editor = document.getElementById('editor');
    var nodes = editor.querySelectorAll('div,pre,h1,h2,h3,blockquote,hr,ul,ol');
    var lines = [];
    for (var i = 0; i < nodes.length; i++) {
      var n = nodes[i];
      switch (n.tagName) {
        case 'PRE':
          lines.push('```');
          var codeEl = n.querySelector('code');
          lines.push(codeEl ? codeEl.textContent : n.textContent);
          lines.push('```');
          break;
        case 'HR': break;
        case 'H1': lines.push('# ' + n.textContent); break;
        case 'H2': lines.push('## ' + n.textContent); break;
        case 'H3': lines.push('### ' + n.textContent); break;
        case 'BLOCKQUOTE': lines.push('> ' + n.textContent); break;
        default:
          lines.push(n.textContent);
      }
    }
    fetch('/save', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: 'name=' + encodeURIComponent(currentNote) + '&content=' + encodeURIComponent(lines.join('\n'))
    })
    .then(function(r) {
      if (r.ok) showStatus('ok', '✓ 保存成功');
      else showStatus('err', '✗ 保存失败: ' + r.status);
    })
    .catch(function() { showStatus('err', '✗ 保存失败'); });
  }, 500);
}

// ========== 格式化按钮 ==========
function doBold() { document.execCommand('bold', false, null); doSave(); }

function doCode() {
  var sel = window.getSelection().toString();
  if (sel && sel.indexOf('\n') !== -1)
    document.execCommand('insertHTML', false, '<pre><code>' + escHtml(sel) + '</code></pre>');
  else
    document.execCommand('insertHTML', false, '<code>' + (sel || '代码') + '</code>');
  doSave();
}

function doHr() { document.execCommand('insertHTML', false, '<hr>'); doSave(); }
function doH1() { wrapSel('<h1>', '</h1>'); }
function doH3() { wrapSel('<h3>', '</h3>'); }
function doUl() { insertLine('• '); }
function doOl() { insertLine('1. '); }
function doQuote() { insertLine('> '); }

function wrapSel(open, close) {
  var sel = window.getSelection().toString() || '文本';
  document.execCommand('insertHTML', false, open + sel + close);
  doSave();
}

function insertLine(prefix) {
  var sel = window.getSelection().toString() || '文本';
  document.execCommand('insertHTML', false, '<div>' + prefix + sel + '</div>');
  doSave();
}

// ========== 粘贴事件：纯文本粘贴（保留原格式） ==========
document.getElementById('editor').addEventListener('paste', function(e) {
  // 如果是图片模式，不拦截粘贴（让全局粘贴事件处理）
  if (isImageMode()) return;
  
  e.preventDefault();
  var text = e.clipboardData.getData('text/plain') || '';
  if (!text) return;

  // 判断是否为纯文本（不包含 Markdown 标记）
  var isPlainText = !text.match(/(^|\s)(#{1,6}\s|[-*+]\s|>\s|\d+\.\s|```)/) && 
                    (text.indexOf('**') === -1 && text.indexOf('__') === -1 && 
                     text.indexOf('~~') === -1 && text.indexOf('`') === -1);
  
  var sel = window.getSelection();
  if (sel.rangeCount > 0) {
    var range = sel.getRangeAt(0);
    range.deleteContents();
    
    if (isPlainText) {
      // 纯文本直接插入
      var textNode = document.createTextNode(text);
      range.insertNode(textNode);
    } else {
      // 可能是 Markdown，尝试渲染
      var div = document.createElement('div');
      div.innerHTML = mdToHtml(text);
      var frag = document.createDocumentFragment();
      while (div.firstChild) frag.appendChild(div.firstChild);
      range.insertNode(frag);
    }
    
    // 光标移到末尾
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }
  doSave();
});

document.getElementById('editor').addEventListener('input', doSave);
document.getElementById('editor').addEventListener('keydown', function(e) {
  if (e.key === 'Tab') { e.preventDefault(); document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;'); }
});

// 页面初始化
var noteName = getNoteName();
if (isImageMode()) {
  // 从 hash 中提取笔记本名
  var hashNoteName = window.location.hash.substring(2);
  if (hashNoteName) {
    showImageMode(hashNoteName);
  } else {
    openNote(noteName);
  }
} else {
  openNote(noteName);
}

// ========== 图片笔记本功能 ==========

var currentImageNoteName = '';
var imageMeta = {};

// 检查hash模式
function checkHashMode() {
  var hash = window.location.hash;
  if (hash && hash.startsWith('#/')) {
    var noteName = hash.substring(2);
    if (noteName) {
      showImageMode(noteName);
    }
  }
}

// 切换模式
function toggleMode() {
  var hash = window.location.hash;
  
  if (hash && hash.startsWith('#/')) {
    // 当前是图片模式，切换到文本模式（从 hash 中取笔记本名）
    var noteName = hash.substring(2);
    window.location.href = '/' + noteName;
  } else {
    // 当前是文本模式，切换到图片模式
    var noteName = getNoteName();
    window.location.href = '/#/' + noteName;
  }
}

// 判断当前是否是图片模式
function isImageMode() {
  var hash = window.location.hash;
  return hash && hash.startsWith('#/');
}

// 显示图片模式
function showImageMode(noteName) {
  currentImageNoteName = noteName;
  
  // 隐藏文本编辑器，显示图片页面
  document.getElementById('edit-page').style.display = 'none';
  document.getElementById('image-page').style.display = 'flex';
  document.getElementById('image-note-title').textContent = noteName;
  
  // 加载图片数据
  loadImageData(noteName);
  
  // 设置拖拽上传事件
  setupDragAndDrop();
  
  // 设置粘贴事件（只在图片模式下生效）
  document.addEventListener('paste', function(e) {
    if (isImageMode()) {
      handlePaste(e);
    }
  });
}

// 加载图片数据
function loadImageData(noteName) {
  // 加载图片列表
  fetch('/list-images?name=' + encodeURIComponent(noteName))
    .then(function(r) { return r.json(); })
    .then(function(images) {
      // 加载meta数据
      return fetch('/meta?name=' + encodeURIComponent(noteName))
        .then(function(r) { return r.json(); })
        .then(function(meta) {
          imageMeta = meta;
          renderImageGrid(images);
        });
    })
    .catch(function(err) {
      console.error('Failed to load image data:', err);
      renderImageGrid([]);
    });
}

// 渲染图片网格
function renderImageGrid(images) {
  var grid = document.getElementById('image-grid');
  var uploadArea = document.getElementById('upload-area');
  
  // 清空现有图片卡片（保留上传区域）
  grid.innerHTML = '';
  grid.appendChild(uploadArea);
  
  // 按时间倒序排列（文件名包含时间戳）
  images.sort().reverse();
  
  // 添加图片卡片
  images.forEach(function(filename) {
    var card = createImageCard(filename);
    grid.appendChild(card);
  });
}

// 创建图片卡片
function createImageCard(filename) {
  var card = document.createElement('div');
  card.className = 'image-card';
  
  var img = document.createElement('img');
  img.className = 'image-preview';
  img.src = '/data/' + currentImageNoteName + '_images/' + filename;
  img.alt = filename;
  img.loading = 'lazy';
  img.onclick = function() { showLightbox(img.src); };
  
  var textarea = document.createElement('textarea');
  textarea.className = 'image-note';
  textarea.placeholder = '添加备注...';
  textarea.value = imageMeta[filename] ? imageMeta[filename].note : '';
  textarea.onblur = function() {
    saveImageNote(filename, textarea.value);
  };
  
  card.appendChild(img);
  card.appendChild(textarea);
  return card;
}

// 显示灯箱
function showLightbox(src) {
  var lightbox = document.createElement('div');
  lightbox.className = 'lightbox';
  lightbox.onclick = function() { document.body.removeChild(lightbox); };
  
  var img = document.createElement('img');
  img.src = src;
  
  lightbox.appendChild(img);
  document.body.appendChild(lightbox);
}

// 保存图片备注
function saveImageNote(filename, note) {
  fetch('/meta', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      name: currentImageNoteName,
      image: filename,
      note: note
    })
  })
  .then(function(r) {
    if (r.ok) {
      showToast('备注已保存');
      // 更新本地meta
      imageMeta[filename] = {image: filename, note: note};
    }
  })
  .catch(function(err) {
    console.error('Failed to save note:', err);
    showToast('保存失败', 'error');
  });
}

// 显示toast提示
function showToast(message, type) {
  var toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  if (type === 'error') {
    toast.style.background = '#f44336';
  }
  
  document.body.appendChild(toast);
  setTimeout(function() {
    document.body.removeChild(toast);
  }, 2500);
}

// 设置拖拽上传
function setupDragAndDrop() {
  var uploadArea = document.getElementById('upload-area');
  
  uploadArea.addEventListener('dragover', function(e) {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
  
  uploadArea.addEventListener('dragleave', function(e) {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
  });
  
  uploadArea.addEventListener('drop', function(e) {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    
    var files = e.dataTransfer.files;
    handleFiles(files);
  });
}

// 处理粘贴
function handlePaste(e) {
  var items = e.clipboardData.items;
  var imageFiles = [];
  
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    if (item.type.indexOf('image') !== -1) {
      var file = item.getAsFile();
      if (file) imageFiles.push(file);
    }
  }
  
  if (imageFiles.length > 0) {
    e.preventDefault();
    handleFiles(imageFiles);
  }
}

// 处理文件选择
function handleFileSelect(e) {
  var files = e.target.files;
  handleFiles(files);
  // 清空input以便下次选择相同文件
  e.target.value = '';
}

// 处理文件上传
function handleFiles(files) {
  for (var i = 0; i < files.length; i++) {
    uploadImage(files[i]);
  }
}

// 上传单张图片
function uploadImage(file) {
  var formData = new FormData();
  formData.append('image', file);
  
  showToast('上传中...', 'info');
  
  fetch('/upload-image?name=' + encodeURIComponent(currentImageNoteName), {
    method: 'POST',
    body: formData
  })
  .then(function(r) {
    if (!r.ok) {
      return r.text().then(function(txt) {
        throw new Error(r.status + ': ' + txt);
      });
    }
    return r.json();
  })
  .then(function(result) {
    showToast('上传成功');
    loadImageData(currentImageNoteName);
  })
  .catch(function(err) {
    console.error('Upload failed:', err);
    showToast('上传失败: ' + err.message, 'error');
  });
}
</script>
</body>
</html>
