<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>go-notepad</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:#333}

#edit-page{height:100vh;display:flex;flex-direction:column}
.toolbar{padding:6px 10px;display:flex;gap:4px;flex-wrap:wrap;background:#fafafa;border-bottom:1px solid #eee;align-items:center}
.btn{padding:4px 12px;font-size:13px;border:1px solid #ccc;background:#fff;cursor:pointer;border-radius:3px;min-width:32px;text-align:center}
.btn:hover{background:#eee}
.status{margin-left:auto;font-size:12px;padding:2px 8px;border-radius:3px;transition:opacity .3s}
.status.saving{color:#666;background:#f0f0f0}
.status.ok{color:#2d7d46;background:#e8f5e9}
.status.err{color:#c62828;background:#ffebee}
.editor-wrap{flex:1;overflow-y:auto}
.editor{min-height:100%;padding:16px;outline:none;font-size:15px;line-height:1.8}
.note-name-bar{padding:6px 12px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px}
.note-name-bar a{color:#666;text-decoration:none;font-size:13px}
.note-name-bar span{font-weight:bold;font-size:14px}

/* 渲染样式 */
.editor h1{font-size:22px;font-weight:bold;margin:12px 0 8px}
.editor h2{font-size:19px;font-weight:bold;margin:10px 0 6px}
.editor h3{font-size:17px;font-weight:bold;margin:10px 0 6px}
.editor blockquote{border-left:4px solid #ddd;padding:4px 12px;color:#666;margin:8px 0;background:#fafafa}
.editor code{background:#f5f5f5;padding:1px 4px;border-radius:3px;font-family:monospace;font-size:13px}
.editor pre{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:4px;padding:12px;font-family:monospace;font-size:13px;line-height:1.5;overflow-x:auto;margin:8px 0;white-space:pre-wrap}
.editor pre code{background:none;padding:0;border-radius:0;font-size:inherit}
.editor hr{border:none;border-top:2px solid #eee;margin:16px 0}
.editor ul,.editor ol{margin:8px 0;padding-left:20px}
.editor li{margin:3px 0}
.editor em,.editor i{font-style:italic}
.editor strong,.editor b{font-weight:bold}

/* 图片样式 */
.editor .image-container{display:inline-block;position:relative;margin:8px 0;border-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.1);cursor:text;resize:both;overflow:hidden;min-width:100px;min-height:50px;max-width:100%;user-select:none}
.editor .image-container:hover{box-shadow:0 2px 6px rgba(0,0,0,.15)}
.editor .image-container img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none}
.editor .image-container .resize-handle{position:absolute;bottom:0;right:0;width:16px;height:16px;background:#2196f3;cursor:se-resize;border-radius:2px 0 4px 0;opacity:0.5}
.editor .image-container:hover .resize-handle{opacity:1}
.editor .image-container .action-buttons{position:absolute;top:4px;right:4px;display:none;flex-direction:row;gap:2px;z-index:10;background:rgba(255,255,255,.95);border-radius:3px;padding:2px;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.editor .image-container:hover .action-buttons{display:flex}
.editor .image-container .action-btn{width:24px;height:24px;background:transparent;color:#555;border:none;border-radius:2px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.editor .image-container .action-btn:hover{background:rgba(0,0,0,.1);color:#333}
.editor .image-container .action-btn.delete:hover{background:rgba(244,67,54,.2);color:#f44336}
.editor .image-container .action-btn svg {
  width: 14px;
  height: 14px;
}
.editor .image-container .double-click-hint{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,.6);color:white;padding:2px 6px;border-radius:3px;font-size:11px;display:none}
.editor .image-container:hover .double-click-hint{display:block}

/* 任务列表样式 */
.editor ul.task-list{list-style:none;padding-left:0}
.editor ul.task-list li{list-style:none}
.editor ul.task-list input[type="checkbox"]{cursor:pointer;vertical-align:middle}

/* 图片灯箱 */
.lightbox{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:2000;display:none;align-items:center;justify-content:center;cursor:pointer}
.lightbox img{max-width:90%;max-height:90%;object-fit:contain;box-shadow:none}

/* 提示 */
.toast{position:fixed;top:20px;right:20px;background:#4caf50;color:white;padding:10px 16px;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:1000;animation:fadeInOut 2.5s ease-in-out}
@keyframes fadeInOut{0%,100%{opacity:0;transform:translateY(-10px)}20%,80%{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="edit-page">
  <div class="note-name-bar">
    <a href="/">📝 列表</a>
    <span>/</span>
    <span id="note-title"></span>
  </div>
  <div class="toolbar">
    <button class="btn" onclick="doBold()" title="加粗"><b>B</b></button>
    <button class="btn" onclick="doH1()" title="一级标题">H¹</button>
    <button class="btn" onclick="doH2()" title="二级标题">H²</button>
    <button class="btn" onclick="doH3()" title="三级标题">H³</button>
    <button class="btn" onclick="doParagraph()" title="段落">¶</button>
    <button class="btn" onclick="doUl()" title="无序列表">•≡</button>
    <button class="btn" onclick="doOl()" title="有序列表">1≡</button>
    <button class="btn" onclick="doTaskList()" title="任务列表">☐</button>
    <button class="btn" onclick="doQuote()" title="引用">❝</button>
    <button class="btn" onclick="doCode()" title="代码块">{}</button>
    <button class="btn" onclick="doLink()" title="链接">🔗</button>
    <button class="btn" onclick="doHr()" title="分割线">─</button>
    <span id="status" class="status" style="opacity:0"></span>
  </div>
  <div class="editor-wrap"><div id="editor" class="editor" contenteditable="true"></div></div>
</div>

<!-- 图片灯箱 -->
<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ========== 全局变量 ==========
var currentNoteName = '';
var isSaving = false;
var saveTimer = null;

// ========== 工具函数 ==========
function showToast(msg, type) {
  var toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  if (type === 'error') {
    toast.style.background = '#f44336';
  } else if (type === 'info') {
    toast.style.background = '#2196f3';
  }
  document.body.appendChild(toast);
  setTimeout(function() {
    toast.remove();
  }, 2500);
}

// ========== 图片处理 ==========
function handlePaste(e) {
  var items = e.clipboardData.items;
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    if (item.type.indexOf('image') !== -1) {
      e.preventDefault();
      var file = item.getAsFile();
      if (file) {
        uploadAndInsertImage(file);
      }
      break;
    }
  }
}

function uploadAndInsertImage(file) {
  if (!currentNoteName) {
    showToast('请先保存笔记', 'error');
    return;
  }
  
  showToast('上传图片中...', 'info');
  
  var formData = new FormData();
  formData.append('image', file);
  
  fetch('/upload-image?name=' + encodeURIComponent(currentNoteName), {
    method: 'POST',
    body: formData
  })
  .then(function(r) {
    if (!r.ok) {
      return r.text().then(function(txt) {
        throw new Error(r.status + ': ' + txt);
      });
    }
    return r.json();
  })
  .then(function(result) {
    // 创建图片容器
    var container = document.createElement('div');
    container.className = 'image-container';
    
    var img = document.createElement('img');
    img.src = result.path;
    img.alt = '图片';
    
    var handle = document.createElement('div');
    handle.className = 'resize-handle';
    
    // 操作按钮
    var actionButtons = document.createElement('div');
    actionButtons.className = 'action-buttons';
    
    var zoomBtn = document.createElement('button');
    zoomBtn.className = 'action-btn';
    zoomBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>';
    zoomBtn.title = '放大';
    zoomBtn.onclick = function(e) {
      e.stopPropagation();
      openLightbox(img.src);
    };
    
    var deleteBtn = document.createElement('button');
    deleteBtn.className = 'action-btn delete';
    deleteBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
    deleteBtn.title = '删除';
    deleteBtn.onclick = function(e) {
      e.stopPropagation();
      // 从 img src 提取文件名，通知后端删除文件
      var imgSrc = img.getAttribute('src');
      var parts = imgSrc.split('/');
      var filename = parts[parts.length - 1];
      fetch('/delete-image?name=' + currentNoteName + '&filename=' + encodeURIComponent(filename), { method: 'POST' });
      container.remove();
      doSave();
      showToast('图片已删除');
    };
    
    actionButtons.appendChild(zoomBtn);
    actionButtons.appendChild(deleteBtn);
    
    // 双击提示
    var hint = document.createElement('div');
    hint.className = 'double-click-hint';
    hint.textContent = '双击放大';
    
    container.appendChild(img);
    container.appendChild(handle);
    container.appendChild(actionButtons);
    container.appendChild(hint);
    
    // 双击放大
    var clickTimer = null;
    container.addEventListener('click', function(e) {
      if (e.target === container || e.target === img) {
        if (clickTimer === null) {
          clickTimer = setTimeout(function() {
            clickTimer = null;
            // 单次点击：选中图片（光标定位）
            var range = document.createRange();
            range.selectNode(container);
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
          }, 300);
        }
      }
    });
    
    container.addEventListener('dblclick', function(e) {
      if (clickTimer) {
        clearTimeout(clickTimer);
        clickTimer = null;
      }
      if (e.target === container || e.target === img) {
        openLightbox(img.src);
      }
    });
    
    // 在光标位置插入
    var selection = window.getSelection();
    if (selection.rangeCount > 0) {
      var range = selection.getRangeAt(0);
      range.deleteContents();
      range.insertNode(container);
      // 插入换行
      var br = document.createElement('br');
      range.collapse(false);
      range.insertNode(br);
      // 移动光标到换行后
      range.setStartAfter(br);
      range.collapse(true);
      selection.removeAllRanges();
      selection.addRange(range);
    } else {
      // 没有选中位置，添加到末尾
      document.getElementById('editor').appendChild(container);
      document.getElementById('editor').appendChild(document.createElement('br'));
    }
    
    showToast('图片已插入');
    doSave(); // 触发保存
  })
  .catch(function(err) {
    console.error('图片上传失败:', err);
    showToast('图片上传失败: ' + err.message, 'error');
  });
}

// 图片点击放大
function openLightbox(imgSrc) {
  var lightbox = document.getElementById('lightbox');
  var lightboxImg = document.getElementById('lightbox-img');
  lightboxImg.src = imgSrc;
  lightbox.style.display = 'flex';
}

function setupImageLightbox() {
  // 保留原有的点击事件处理，但只处理非容器内的图片
  // 容器内的图片现在通过双击或悬停按钮打开
  document.getElementById('editor').addEventListener('click', function(e) {
    var target = e.target;
    // 点击图片（非容器内的图片）
    if (target.tagName === 'IMG' && !target.parentElement.classList.contains('image-container')) {
      openLightbox(target.src);
    }
  });
}

// ========== 编辑器功能 ==========
function doBold() { document.execCommand('bold'); }
function doH1() { document.execCommand('formatBlock', false, '<h1>'); }
function doH2() { document.execCommand('formatBlock', false, '<h2>'); }
function doH3() { document.execCommand('formatBlock', false, '<h3>'); }
function doParagraph() { document.execCommand('formatBlock', false, '<p>'); }
function doUl() { document.execCommand('insertUnorderedList'); }
function doOl() { document.execCommand('insertOrderedList'); }
function doTaskList() {
  var li = document.createElement('li');
  var checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.style.marginRight = '8px';
  checkbox.onclick = function(e) {
    e.stopPropagation(); // 防止事件冒泡
  };
  li.appendChild(checkbox);
  li.appendChild(document.createTextNode(' '));
  
  // 检查是否在列表中
  var sel = window.getSelection();
  if (sel.rangeCount > 0) {
    var range = sel.getRangeAt(0);
    var parent = range.commonAncestorContainer;
    while (parent && parent.nodeType !== 1) {
      parent = parent.parentNode;
    }
    if (parent && (parent.tagName === 'UL' || parent.tagName === 'OL')) {
      // 在列表中：插入 li
      parent.appendChild(li);
    } else {
      // 不在列表中：创建 ul
      var ul = document.createElement('ul');
      ul.className = 'task-list';
      ul.appendChild(li);
      insertAtCursor(ul);
    }
  }
}
function doQuote() { document.execCommand('formatBlock', false, '<blockquote>'); }
function doLink() {
  var url = prompt('输入链接 URL:');
  if (url) {
    var text = prompt('输入链接文本:', url);
    var sel = window.getSelection();
    var range = sel.getRangeAt(0);
    var link = document.createElement('a');
    link.href = url;
    link.textContent = text || url;
    link.target = '_blank';
    link.rel = 'noopener noreferrer';
    if (!range.collapsed) {
      range.extractContents();
    }
    range.insertNode(link);
  }
}
function doCode() {
  var pre = document.createElement('pre');
  var code = document.createElement('code');
  code.textContent = '// 输入代码';
  pre.appendChild(code);
  insertAtCursor(pre);
}
function doHr() { document.execCommand('insertHorizontalRule'); }

function insertAtCursor(node) {
  var selection = window.getSelection();
  if (selection.rangeCount > 0) {
    var range = selection.getRangeAt(0);
    range.deleteContents();
    range.insertNode(node);
    range.setStartAfter(node);
    range.collapse(true);
    selection.removeAllRanges();
    selection.addRange(range);
  }
}

// ========== 保存/加载 ==========
function doSave() {
  if (isSaving || !currentNoteName) return;
  isSaving = true;
  
  // 同步任务列表复选框状态到 HTML
  var checkboxes = document.getElementById('editor').querySelectorAll('input[type="checkbox"]');
  checkboxes.forEach(function(cb) {
    if (cb.checked) {
      cb.setAttribute('checked', 'checked');
    } else {
      cb.removeAttribute('checked');
    }
  });
  
  var editor = document.getElementById('editor');
  var content = editor.innerHTML;
  
  var status = document.getElementById('status');
  status.textContent = '保存中...';
  status.className = 'status saving';
  status.style.opacity = 1;
  
  fetch('/save?name=' + encodeURIComponent(currentNoteName), {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: content
  })
  .then(function(r) {
    if (!r.ok) throw new Error('保存失败: ' + r.status);
    status.textContent = '已保存';
    status.className = 'status ok';
    setTimeout(function() { status.style.opacity = 0; }, 2000);
  })
  .catch(function(err) {
    console.error('Save error:', err);
    status.textContent = '保存失败';
    status.className = 'status err';
    setTimeout(function() { status.style.opacity = 0; }, 3000);
  })
  .finally(function() {
    isSaving = false;
  });
}

function openNote(name) {
  currentNoteName = name;
  document.getElementById('note-title').textContent = name;
  
  fetch('/load?name=' + encodeURIComponent(name))
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var editor = document.getElementById('editor');
      editor.innerHTML = text || '<p><br></p>';
      // 将已有的图片包裹成容器
      wrapExistingImages();
      editor.focus();
    })
    .catch(function(err) {
      console.error('Load error:', err);
      document.getElementById('editor').innerHTML = '<p><br></p>';
    });
}

// 将已有的图片包裹成可拖拽大小的容器
function wrapExistingImages() {
  var editor = document.getElementById('editor');
  var images = editor.querySelectorAll('img:not(.image-container img)');
  
  images.forEach(function(img) {
    // 如果图片已经在容器里，跳过
    if (img.parentElement && img.parentElement.classList.contains('image-container')) {
      return;
    }
    
    var container = document.createElement('div');
    container.className = 'image-container';
    
    var handle = document.createElement('div');
    handle.className = 'resize-handle';
    
    // 操作按钮
    var actionButtons = document.createElement('div');
    actionButtons.className = 'action-buttons';
    
    var zoomBtn = document.createElement('button');
    zoomBtn.className = 'action-btn';
    zoomBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>';
    zoomBtn.title = '放大';
    zoomBtn.onclick = function(e) {
      e.stopPropagation();
      openLightbox(img.src);
    };
    
    var deleteBtn = document.createElement('button');
    deleteBtn.className = 'action-btn delete';
    deleteBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
    deleteBtn.title = '删除';
    deleteBtn.onclick = function(e) {
      e.stopPropagation();
      // 从 img src 提取文件名，通知后端删除文件
      var imgSrc = img.getAttribute('src');
      var parts = imgSrc.split('/');
      var filename = parts[parts.length - 1];
      fetch('/delete-image?name=' + currentNoteName + '&filename=' + encodeURIComponent(filename), { method: 'POST' });
      container.remove();
      doSave();
      showToast('图片已删除');
    };
    
    actionButtons.appendChild(zoomBtn);
    actionButtons.appendChild(deleteBtn);
    
    // 双击提示
    var hint = document.createElement('div');
    hint.className = 'double-click-hint';
    hint.textContent = '双击放大';
    
    // 替换图片
    img.parentNode.insertBefore(container, img);
    container.appendChild(img);
    container.appendChild(handle);
    container.appendChild(actionButtons);
    container.appendChild(hint);
    
    // 双击放大
    var clickTimer = null;
    container.addEventListener('click', function(e) {
      if (e.target === container || e.target === img) {
        if (clickTimer === null) {
          clickTimer = setTimeout(function() {
            clickTimer = null;
            var range = document.createRange();
            range.selectNode(container);
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
          }, 300);
        }
      }
    });
    
    container.addEventListener('dblclick', function(e) {
      if (clickTimer) {
        clearTimeout(clickTimer);
        clickTimer = null;
      }
      if (e.target === container || e.target === img) {
        openLightbox(img.src);
      }
    });
  });
}

// ========== 页面初始化 ==========
function getNoteName() {
  var path = window.location.pathname;
  if (path === '/' || path === '') return 'default';
  return path.substring(1);
}

function init() {
  var noteName = getNoteName();
  console.log('打开笔记本:', noteName);
  
  // 设置粘贴事件
  document.getElementById('editor').addEventListener('paste', handlePaste);
  
  // 设置图片灯箱
  setupImageLightbox();
  
  // 自动保存
  document.getElementById('editor').addEventListener('input', function() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(doSave, 1000);
  });
  
  // 防止 Tab 键切换焦点
  document.getElementById('editor').addEventListener('keydown', function(e) {
    if (e.key === 'Tab') { e.preventDefault(); document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;'); }
  });
  
  // 键盘删除图片：用 TreeWalker 从光标位置向前查找
  document.addEventListener('keydown', function(e) {
    if ((e.key === 'Delete' || e.key === 'Backspace') && !e.ctrlKey && !e.altKey) {
      var selection = window.getSelection();
      if (selection.rangeCount > 0) {
        var range = selection.getRangeAt(0);
        var container = null;
        
        // 方法1：选区是否在图片容器内
        var node = range.startContainer;
        while (node) {
          if (node.nodeType === 1 && node.classList && node.classList.contains('image-container')) {
            container = node;
            break;
          }
          node = node.parentElement || node.parentNode;
        }
        
        // 方法2：Backspace 光标折叠，向前查找图片容器
        if (!container && e.key === 'Backspace' && range.collapsed) {
          // 光标在文本中间则不触发
          if (!(range.startContainer.nodeType === 3 && range.startOffset > 0)) {
            var editor = document.getElementById('editor');
            var walker = document.createTreeWalker(editor, NodeFilter.SHOW_ELEMENT | NodeFilter.SHOW_TEXT, null, false);
            walker.currentNode = range.startContainer;
            
            // 收集要删除的中间节点（<br>、空文本）
            var toRemove = [];
            var foundImage = null;
            var prev = walker.previousNode();
            while (prev) {
              if (prev.nodeType === 1 && prev.classList && prev.classList.contains('image-container')) {
                foundImage = prev;
                break;
              }
              if ((prev.nodeType === 3 && prev.textContent.trim() === '') || (prev.nodeType === 1 && prev.nodeName === 'BR')) {
                toRemove.push(prev);
                prev = walker.previousNode();
                continue;
              }
              break; // 遇到其他内容，停止
            }
            
            if (foundImage) {
              e.preventDefault();
              // 先清理中间 <br> 和空文本
              for (var k = 0; k < toRemove.length; k++) {
                if (toRemove[k].parentNode) toRemove[k].parentNode.removeChild(toRemove[k]);
              }
              container = foundImage;
            }
          }
        }
        
        if (container && container.classList && container.classList.contains('image-container')) {
          e.preventDefault();
          var imgEl = container.querySelector('img');
          if (imgEl) {
            var imgSrc2 = imgEl.getAttribute('src');
            var parts2 = imgSrc2.split('/');
            var filename2 = parts2[parts2.length - 1];
            fetch('/delete-image?name=' + currentNoteName + '&filename=' + encodeURIComponent(filename2), { method: 'POST' });
          }
          container.remove();
          doSave();
          showToast('图片已删除');
        }
      }
    }
  });
  
  // 打开笔记
  openNote(noteName);
  
  // 版本信息
  fetch('/version')
    .then(res => res.json())
    .then(data => {
      console.log('go-notepad version:', data.version, 'built on', data.buildDate);
      var versionEl = document.createElement('div');
      versionEl.style.cssText = 'position:fixed;bottom:5px;right:5px;font-size:11px;color:#999;opacity:0.7;z-index:9999;cursor:pointer;';
      versionEl.textContent = data.version;
      versionEl.title = '构建于 ' + data.buildDate;
      versionEl.onclick = function() {
        window.open('/version', '_blank');
      };
      document.body.appendChild(versionEl);
    })
    .catch(err => console.error('Failed to fetch version:', err));
}

// 页面加载完成
window.onload = init;
</script>
</body>
</html>
